; PlatformIO Project Configuration File
; ESP32 Marauder (CYD) - Weighing Master
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = huge_app.csv

; 库依赖
lib_deps = 
	; 4-20ma/ModbusMaster@^2.0.1  ; RS485未启用时禁用
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@~8.4.0

; Phase 4: 最小 ST7796 + XPT2046 + LVGL 测试
build_flags =
	-D USER_SETUP_LOADED=1
	-D ST7796_DRIVER=1
	-D TFT_WIDTH=320
	-D TFT_HEIGHT=480
	-D TFT_MISO=12
	-D TFT_MOSI=13
	-D TFT_SCLK=14
	-D TFT_CS=15
	-D TFT_DC=2
	-D TFT_RST=-1
	-D TFT_BL=27
	-D TFT_BACKLIGHT_ON=HIGH
	-D TOUCH_CS=33
	-D SPI_FREQUENCY=40000000
	-D SPI_TOUCH_FREQUENCY=2500000
	-D LV_CONF_INCLUDE_SIMPLE=1
	-D LV_FONT_MONTSERRAT_18=1
	-D LV_FONT_MONTSERRAT_24=1
	-D LV_FONT_MONTSERRAT_32=1
	-D LV_FONT_MONTSERRAT_48=1
	-D TFT_RGB_ORDER=TFT_BGR
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D LOAD_GFXFF=1
	-D SMOOTH_FONT=0

[platformio]
src_dir = src
include_dir = include
lib_dir = lib
