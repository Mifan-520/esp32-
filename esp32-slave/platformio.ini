; PlatformIO Project Configuration File
; ESP32 Slave - Weighing Display
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv

; 库依赖
lib_deps = 
	; ESP32 内置 BLE 库，无需额外依赖
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@~8.4.0

; 编译选项 - 4寸 ST7796 + LVGL 配置
build_flags =
	-D SLAVE_DEVICE=1
	-D USER_SETUP_LOADED=1
	-D ST7796_DRIVER=1
	-D TFT_WIDTH=320
	-D TFT_HEIGHT=480
	-D TFT_MISO=12
	-D TFT_MOSI=13
	-D TFT_SCLK=14
	-D TFT_CS=15
	-D TFT_DC=2
	-D TFT_RST=-1
	-D TFT_BL=27
	-D SPI_FREQUENCY=20000000
	-D SPI_READ_FREQUENCY=20000000
	-D TFT_RGB_ORDER=TFT_BGR
	-D LV_CONF_INCLUDE_SIMPLE=1
	-D LV_FONT_MONTSERRAT_48=1
	-D LV_FONT_MONTSERRAT_24=1

[platformio]
src_dir = src
include_dir = include
