; A33E unified weighing firmware - M1 UI simulation
; Board: LCDWIKI 4.0inch ESP32-32E ST7796 E32R40T/E32N40T

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv

lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@~8.4.0
	h2zero/NimBLE-Arduino@1.4.3

build_flags =
	-D UNIFIED_FIRMWARE=1
	-D USER_SETUP_LOADED=1
	-D ST7796_DRIVER=1
	-D TFT_WIDTH=320
	-D TFT_HEIGHT=480
	-D TFT_MISO=12
	-D TFT_MOSI=13
	-D TFT_SCLK=14
	-D TFT_CS=15
	-D TFT_DC=2
	-D TFT_RST=-1
	-D TFT_BL=27
	-D TOUCH_CS=33
	-D TOUCH_IRQ=36
	-D SPI_FREQUENCY=20000000
	-D SPI_READ_FREQUENCY=20000000
	-D SPI_TOUCH_FREQUENCY=2500000
	-D TFT_RGB_ORDER=TFT_BGR
	-D LV_CONF_INCLUDE_SIMPLE=1
	-D LV_FONT_MONTSERRAT_18=1
	-D LV_FONT_MONTSERRAT_24=1
	-D LV_FONT_MONTSERRAT_32=1
	-D LV_FONT_MONTSERRAT_48=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D SMOOTH_FONT=0

[platformio]
src_dir = src
include_dir = include
